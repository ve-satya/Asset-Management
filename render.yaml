services:
  - type: web
    name: asset-management
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm ci --include=dev && npm --workspace backend run db:generate && npm --workspace backend run db:deploy && npm --workspace backend run build
    startCommand: npm --workspace backend start
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
